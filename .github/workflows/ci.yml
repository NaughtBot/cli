name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  build-test:
    # NOTE: WS3.6 falls back to ubuntu-latest because the `arc-runners-naughtbot`
    # self-hosted runner pool is not yet provisioned for NaughtBot/cli.
    # Track the org-permissions follow-up to migrate this off ubuntu-latest.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      # AKZK's Go bindings compile vendored Longfellow C++ sources via cgo and
      # link against OpenSSL. ubuntu-latest already has g++ but we install the
      # OpenSSL development headers explicitly.
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libssl-dev

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      # The CLI ships with vector-based regression tests that read shared
      # fixture JSON from `<repo>/../data/`. WS3.4 will copy those fixtures
      # into the repo and fix the resolver path; until then we skip the
      # impacted tests. Everything else runs. Drop the -skip regex once
      # WS3.4 lands.
      - name: Test
        env:
          CGO_ENABLED: "1"
          SKIP_PATTERN: 'TestCrossLanguageVectors|TestComputeSASAgainstVectors|TestSAS(Device|Sorting)|TestSSHVectors|TestGPGVectors|TestCrossPlatformFingerprint|TestBuildPublicKeyBlob|TestComputeSSHFingerprint|TestBuildKeyHandle|TestWrite(Public|Private)KeyFile|TestWriteKeyFiles|TestWritePrivateKeyFilePermissions|TestSSHSK|TestEnrollResponseParsing|TestSignResponseParsing|TestSSHSignature|TestSignatureFormatMatchesiOSExpectations|TestPathUsesCanonicalSharedDataDir'
        run: go test -skip "$SKIP_PATTERN" ./...
